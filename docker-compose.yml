version: "3.9"

# Lightweight local smoke-test stack. NOT a substitute for the Kubernetes
# deployment — use this only to sanity-check the demo apps and the
# Prometheus/Grafana/Loki wiring before pushing to a cluster.

services:
  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./hack/prometheus.local.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:2.9.8
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki

  demo-api:
    build: ./apps/demo-api
    environment:
      - PORT=8080
    ports:
      - "8081:8080"

  demo-worker:
    build: ./apps/demo-worker
    depends_on:
      - demo-api

  frontend:
    build: ./apps/frontend
    environment:
      - API_URL=http://demo-api:8080
    ports:
      - "8080:8080"
    depends_on:
      - demo-api
