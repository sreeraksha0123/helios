# PrometheusRule for alerting
# Only deploy if you have Prometheus Operator installed
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: self-healing-alerts
  namespace: self-healing
  labels:
    prometheus: kube-prometheus
spec:
  groups:
  - name: self-healing-apps
    interval: 30s
    rules:
    - alert: PodCrashLooping
      expr: rate(kube_pod_container_status_restarts_total{namespace="self-healing"}[15m]) > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Pod {{ $labels.pod }} is crash looping"
        description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted {{ $value }} times in the last 15 minutes"
    
    - alert: PodNotReady
      expr: kube_pod_status_phase{namespace="self-healing", phase!="Running"} == 1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Pod {{ $labels.pod }} is not ready"
        description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been in {{ $labels.phase }} state for more than 5 minutes"
    
    - alert: DeploymentReplicasMismatch
      expr: kube_deployment_spec_replicas{namespace="self-healing"} != kube_deployment_status_replicas_available{namespace="self-healing"}
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Deployment {{ $labels.deployment }} has mismatched replicas"
        description: "Deployment {{ $labels.deployment }} in namespace {{ $labels.namespace }} has {{ $value }} available replicas but expects {{ $labels.spec_replicas }}"
    
    - alert: HighPodMemoryUsage
      expr: container_memory_usage_bytes{namespace="self-healing"} / container_spec_memory_limit_bytes{namespace="self-healing"} > 0.9
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High memory usage in pod {{ $labels.pod }}"
        description: "Pod {{ $labels.pod }} is using {{ $value | humanizePercentage }} of its memory limit"
    
    - alert: HighPodCPUUsage
      expr: rate(container_cpu_usage_seconds_total{namespace="self-healing"}[5m]) / container_spec_cpu_quota{namespace="self-healing"} > 0.9
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High CPU usage in pod {{ $labels.pod }}"
        description: "Pod {{ $labels.pod }} is using {{ $value | humanizePercentage }} of its CPU limit"
