name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.22"

jobs:
  lint-charts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: "v3.15.4"
      - name: helm lint
        run: |
          for c in charts/*/; do
            echo "Linting $c"
            helm lint "$c"
          done
      - name: helm template (dry render, catches templating errors)
        run: |
          helm template helios-infra charts/helios-infrastructure > /dev/null
          helm template helios-platform charts/helios-platform > /dev/null
          helm template helios-app charts/helios-app > /dev/null

  lint-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: yamllint chaos experiments and dashboards
        run: |
          pip install yamllint
          yamllint -d "{extends: default, rules: {line-length: disable}}" chaos/ .github/workflows/

  go-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [controllers, apps/demo-api, apps/demo-worker, apps/frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: go vet & test
        working-directory: ${{ matrix.module }}
        run: |
          go vet ./...
          go test ./... -v

  build-and-push:
    runs-on: ubuntu-latest
    needs: [lint-charts, lint-yaml, go-test]
    if: github.event_name == 'push'
    strategy:
      matrix:
        component: [demo-api, demo-worker, frontend, selfhealing-operator]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve build context
        id: ctx
        run: |
          if [ "${{ matrix.component }}" = "selfhealing-operator" ]; then
            echo "path=controllers" >> "$GITHUB_OUTPUT"
          else
            echo "path=apps/${{ matrix.component }}" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/build-push-action@v5
        with:
          context: ${{ steps.ctx.outputs.path }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.component }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
