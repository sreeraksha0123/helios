name: Chaos Test Suite

on:
  schedule:
    - cron: "0 3 * * 1-5"   # weekday mornings, staging only
  workflow_dispatch: {}

jobs:
  run-chaos-suite:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
        with: { version: "v1.30.0" }
      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"
      - name: Apply chaos experiments
        run: ./scripts/chaos-run.sh
      - name: Wait for experiments to complete and remediation to settle
        run: sleep 300
      - name: Validate self-healing + capture MTTR
        run: ./scripts/validate-self-healing.sh --ci
      - name: Upload MTTR report
        uses: actions/upload-artifact@v4
        with:
          name: mttr-report
          path: /tmp/helios-mttr-report.json
