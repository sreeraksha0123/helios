{{- $root := . -}}
{{- range $svc := list "demoApi" "demoWorker" "frontend" }}
{{- $cfg := index $root.Values $svc }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $cfg.name }}
  namespace: {{ $root.Values.namespace }}
  labels:
    {{- include "helios-app.labels" $root | nindent 4 }}
    app: {{ $cfg.name }}
spec:
  replicas: {{ $cfg.replicaCount }}
  selector:
    matchLabels:
      app: {{ $cfg.name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ $root.Values.rollingUpdate.maxSurge }}
      maxUnavailable: {{ $root.Values.rollingUpdate.maxUnavailable }}
  template:
    metadata:
      labels:
        app: {{ $cfg.name }}
        severity: info
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ default 8080 $cfg.port }}"
    spec:
      {{- if $root.Values.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ $root.Values.topologySpreadConstraints.maxSkew }}
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: {{ $cfg.name }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: {{ $cfg.name }}
                topologyKey: kubernetes.io/hostname
      {{- end }}
      initContainers:
        - name: wait-for-dns
          image: busybox:1.36
          command: ["sh", "-c", "until nslookup kubernetes.default; do sleep 2; done"]
      containers:
        - name: {{ $cfg.name }}
          image: "{{ $root.Values.image.registry }}/{{ $cfg.name }}:{{ $root.Values.image.tag }}"
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          {{- if $cfg.port }}
          ports:
            - containerPort: {{ $cfg.port }}
          readinessProbe:
            httpGet: { path: /healthz, port: {{ $cfg.port }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: {{ $cfg.port }} }
            initialDelaySeconds: 10
            periodSeconds: 20
          {{- end }}
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          resources:
            {{- toYaml $cfg.resources | nindent 12 }}
{{- end }}
