apiVersion: v2
name: helios-infrastructure
description: |
  Core observability infrastructure for Helios: Prometheus Operator (via
  kube-prometheus-stack), Grafana, Loki + Promtail, cert-manager, and the
  nginx ingress controller. Wraps well-maintained upstream charts and adds
  Helios-specific dashboards, recording rules, and alert routing.
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - observability
  - prometheus
  - grafana
  - loki
  - kubernetes
maintainers:
  - name: Helios Platform Team
dependencies:
  - name: kube-prometheus-stack
    version: "61.x.x"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: kube-prometheus-stack.enabled
  - name: loki-stack
    version: "2.10.x"
    repository: "https://grafana.github.io/helm-charts"
    condition: loki-stack.enabled
  - name: cert-manager
    version: "v1.15.x"
    repository: "https://charts.jetstack.io"
    condition: cert-manager.enabled
  - name: ingress-nginx
    version: "4.11.x"
    repository: "https://kubernetes.github.io/ingress-nginx"
    condition: ingress-nginx.enabled
