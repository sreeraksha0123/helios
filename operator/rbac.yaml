---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: appmonitor-operator
  namespace: self-healing

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: appmonitor-operator
rules:
# AppMonitor CRD permissions
- apiGroups:
  - healing.example.com
  resources:
  - appmonitors
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - healing.example.com
  resources:
  - appmonitors/status
  verbs:
  - get
  - update
  - patch
# Deployment permissions
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - list
  - watch
  - update
  - patch
- apiGroups:
  - apps
  resources:
  - deployments/scale
  verbs:
  - get
  - update
  - patch
# Pod permissions
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
  - delete
# Event permissions
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: appmonitor-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: appmonitor-operator
subjects:
- kind: ServiceAccount
  name: appmonitor-operator
  namespace: self-healing

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: appmonitor-operator-leader-election
  namespace: self-healing
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: appmonitor-operator-leader-election
  namespace: self-healing
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: appmonitor-operator-leader-election
subjects:
- kind: ServiceAccount
  name: appmonitor-operator
  namespace: self-healing
