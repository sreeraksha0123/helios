apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: appmonitors.healing.example.com
spec:
  group: healing.example.com
  names:
    kind: AppMonitor
    listKind: AppMonitorList
    plural: appmonitors
    singular: appmonitor
    shortNames:
    - am
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - targetDeployment
            - healthCheckEndpoint
            properties:
              targetDeployment:
                type: string
                description: "Name of the deployment to monitor"
              healthCheckEndpoint:
                type: string
                description: "HTTP endpoint for health checks"
                pattern: '^/.*'
              checkIntervalSeconds:
                type: integer
                minimum: 5
                maximum: 300
                default: 30
                description: "Interval between health checks in seconds"
              failureThreshold:
                type: integer
                minimum: 1
                maximum: 10
                default: 3
                description: "Number of consecutive failures before remediation"
              remediationStrategy:
                type: string
                enum:
                - restart
                - scale
                - notify
                default: restart
                description: "Action to take when unhealthy"
              scaleUpReplicas:
                type: integer
                minimum: 1
                maximum: 20
                default: 1
                description: "Number of replicas to add when scaling up"
              notificationWebhook:
                type: string
                pattern: '^https?://.*'
                description: "Webhook URL for notifications"
          status:
            type: object
            properties:
              state:
                type: string
                enum:
                - Healthy
                - Unhealthy
                - Remediating
                - Unknown
              lastCheckTime:
                type: string
                format: date-time
              consecutiveFailures:
                type: integer
              message:
                type: string
              lastRemediationTime:
                type: string
                format: date-time
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Target
      type: string
      jsonPath: .spec.targetDeployment
    - name: Status
      type: string
      jsonPath: .status.state
    - name: Strategy
      type: string
      jsonPath: .spec.remediationStrategy
    - name: Failures
      type: integer
      jsonPath: .status.consecutiveFailures
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
