apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: pod-failure-experiment
  namespace: helios-app
  labels:
    helios.io/chaos-suite: "core"
spec:
  action: pod-failure
  mode: one
  selector:
    namespaces: [helios-app]
    labelSelectors:
      app: demo-api
  duration: "30s"
  scheduler:
    cron: "@every 1h"
