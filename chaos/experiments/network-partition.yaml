apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: network-partition-experiment
  namespace: helios-app
  labels:
    helios.io/chaos-suite: "core"
spec:
  action: partition
  mode: all
  selector:
    namespaces: [helios-app]
    labelSelectors:
      app: demo-api
  direction: both
  duration: "45s"
  scheduler:
    cron: "@every 3h"
